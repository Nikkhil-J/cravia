<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Concept A — Readable Strikethrough</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0e0e0e;
    font-family: 'Inter', system-ui, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 60px 24px;
  }

  .label {
    position: fixed;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    color: #666;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 6px 16px;
    border-radius: 20px;
    white-space: nowrap;
  }

  .block {
    display: flex;
    flex-direction: column;
    gap: 18px;
    max-width: 520px;
    width: 100%;
  }

  .row {
    display: flex;
    align-items: center;
    gap: 16px;
    opacity: 0;
    transform: translateX(-14px);
    animation: fadeIn 0.4s ease-out forwards;
  }
  .row:nth-child(1) { animation-delay: 0.05s; }
  .row:nth-child(2) { animation-delay: 0.25s; }
  .row:nth-child(3) { animation-delay: 0.45s; }

  @keyframes fadeIn {
    to { opacity: 1; transform: translateX(0); }
  }

  .icon {
    width: 28px;
    height: 28px;
    border-radius: 7px;
    background: #e8521a;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 18px;
    color: #fff;
    font-weight: 300;
    line-height: 1;
  }

  /* The key: big text + hairline strike so it's fully readable */
  .text-wrap {
    position: relative;
    font-size: 20px;
    font-weight: 500;
    color: #7a7a7a;
    line-height: 1.35;
  }

  .strike {
    position: absolute;
    left: 0;
    top: 53%;
    width: 100%;
    height: 1px; /* hairline */
    background: #e8521a;
    transform-origin: left center;
    transform: scaleX(0);
    animation: strikeAnim 0.5s cubic-bezier(0.77,0,0.18,1) forwards;
  }
  .row:nth-child(1) .strike { animation-delay: 0.4s; }
  .row:nth-child(2) .strike { animation-delay: 0.6s; }
  .row:nth-child(3) .strike { animation-delay: 0.8s; }

  @keyframes strikeAnim {
    to { transform: scaleX(1); }
  }
</style>
</head>
<body>
  <div class="label">A — Bigger Text, Hairline Strike</div>
  <div class="block">
    <div class="row">
      <div class="icon">×</div>
      <div class="text-wrap">
        Asking the waiter. "Sir, everything is good, sir."
        <span class="strike"></span>
      </div>
    </div>
    <div class="row">
      <div class="icon">×</div>
      <div class="text-wrap">
        4.3 stars. 1,200 reviews. Zero about the food.
        <span class="strike"></span>
      </div>
    </div>
    <div class="row">
      <div class="icon">×</div>
      <div class="text-wrap">
        Ordering paneer tikka. Again. Like always.
        <span class="strike"></span>
      </div>
    </div>
  </div>
</body>
</html>
