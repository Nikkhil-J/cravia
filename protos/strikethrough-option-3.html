<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Option 3 — Numbered Typewriter</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0e0e0e;
    font-family: 'Inter', system-ui, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 40px 24px;
  }

  .label {
    position: fixed;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    color: #666;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 6px 14px;
    border-radius: 20px;
  }

  .block {
    display: flex;
    flex-direction: column;
    gap: 20px;
    max-width: 460px;
    width: 100%;
  }

  .row {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    opacity: 0;
    animation: appear 0.3s ease forwards;
  }
  .row:nth-child(1) { animation-delay: 0.1s; }
  .row:nth-child(2) { animation-delay: 0.4s; }
  .row:nth-child(3) { animation-delay: 0.7s; }

  @keyframes appear {
    to { opacity: 1; }
  }

  .left-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    flex-shrink: 0;
    padding-top: 2px;
  }

  .num {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: #e8521a;
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    position: relative;
    /* draw the × */
  }
  .num::before, .num::after {
    content: '';
    position: absolute;
    width: 10px;
    height: 2px;
    background: #fff;
    border-radius: 1px;
  }
  .num::before { transform: rotate(45deg); }
  .num::after  { transform: rotate(-45deg); }

  .connector {
    width: 1px;
    flex: 1;
    min-height: 20px;
    background: linear-gradient(to bottom, #e8521a44, transparent);
    margin-top: 4px;
  }
  .row:last-child .connector { display: none; }

  .text-wrap {
    position: relative;
    font-size: 16px;
    color: #606060;
    line-height: 1.5;
    padding-top: 4px;
  }

  .strike {
    position: absolute;
    left: 0;
    top: calc(50% + 2px);
    width: 100%;
    height: 1.5px;
    background: #e8521a;
    transform-origin: left center;
    transform: scaleX(0);
    animation: strikeAnim 0.5s cubic-bezier(0.77,0,0.18,1) forwards;
  }
  .row:nth-child(1) .strike { animation-delay: 0.5s; }
  .row:nth-child(2) .strike { animation-delay: 0.8s; }
  .row:nth-child(3) .strike { animation-delay: 1.1s; }

  @keyframes strikeAnim {
    to { transform: scaleX(1); }
  }
</style>
</head>
<body>
  <div class="label">Option 3 — Connected List</div>
  <div class="block">
    <div class="row">
      <div class="left-col">
        <div class="num"></div>
        <div class="connector"></div>
      </div>
      <div class="text-wrap">
        Asking the waiter. "Sir, everything is good, sir."
        <span class="strike"></span>
      </div>
    </div>
    <div class="row">
      <div class="left-col">
        <div class="num"></div>
        <div class="connector"></div>
      </div>
      <div class="text-wrap">
        4.3 stars. 1,200 reviews. Zero about the food.
        <span class="strike"></span>
      </div>
    </div>
    <div class="row">
      <div class="left-col">
        <div class="num"></div>
        <div class="connector"></div>
      </div>
      <div class="text-wrap">
        Ordering paneer tikka. Again. Like always.
        <span class="strike"></span>
      </div>
    </div>
  </div>
</body>
</html>
