<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Concept C — Dim + "Not anymore" badge</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0e0e0e;
    font-family: 'Inter', system-ui, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 60px 24px;
  }

  .label {
    position: fixed;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    color: #666;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 6px 16px;
    border-radius: 20px;
    white-space: nowrap;
  }

  .block {
    display: flex;
    flex-direction: column;
    gap: 18px;
    max-width: 520px;
    width: 100%;
  }

  .row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    opacity: 0;
    transform: translateX(-12px);
    animation: fadeIn 0.4s ease-out forwards;
  }
  .row:nth-child(1) { animation-delay: 0.05s; }
  .row:nth-child(2) { animation-delay: 0.22s; }
  .row:nth-child(3) { animation-delay: 0.39s; }

  @keyframes fadeIn {
    to { opacity: 1; transform: translateX(0); }
  }

  .text {
    font-size: 20px;
    font-weight: 500;
    color: #3e3e3e; /* very dim — this is a "dead" problem */
    line-height: 1.4;
    flex: 1;
    text-decoration: line-through;
    text-decoration-color: #2e2e2e; /* nearly invisible, just structural */
    text-decoration-thickness: 1px;
  }

  /* "Not anymore" badge appears after text fades in */
  .badge {
    flex-shrink: 0;
    background: transparent;
    border: 1px solid #e8521a;
    color: #e8521a;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 20px;
    opacity: 0;
    animation: badgeAppear 0.35s ease-out forwards;
    white-space: nowrap;
  }
  .row:nth-child(1) .badge { animation-delay: 0.45s; }
  .row:nth-child(2) .badge { animation-delay: 0.62s; }
  .row:nth-child(3) .badge { animation-delay: 0.79s; }

  @keyframes badgeAppear {
    from { opacity: 0; transform: scale(0.85); }
    to   { opacity: 1; transform: scale(1); }
  }
</style>
</head>
<body>
  <div class="label">C — Dimmed Text + "Not anymore" Badge</div>
  <div class="block">
    <div class="row">
      <span class="text">Asking the waiter. "Sir, everything is good, sir."</span>
      <span class="badge">Not anymore</span>
    </div>
    <div class="row">
      <span class="text">4.3 stars. 1,200 reviews. Zero about the food.</span>
      <span class="badge">Not anymore</span>
    </div>
    <div class="row">
      <span class="text">Ordering paneer tikka. Again. Like always.</span>
      <span class="badge">Not anymore</span>
    </div>
  </div>
</body>
</html>
