<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Option 2 — Bold Cards</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0e0e0e;
    font-family: 'Inter', system-ui, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 40px 24px;
  }

  .label {
    position: fixed;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    color: #666;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 6px 14px;
    border-radius: 20px;
  }

  .block {
    display: flex;
    flex-direction: column;
    gap: 10px;
    max-width: 480px;
    width: 100%;
  }

  .card {
    background: #161616;
    border: 1px solid #242424;
    border-radius: 10px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    opacity: 0;
    transform: translateY(8px);
    animation: slideUp 0.4s ease-out forwards;
  }
  .card:nth-child(1) { animation-delay: 0s; }
  .card:nth-child(2) { animation-delay: 0.18s; }
  .card:nth-child(3) { animation-delay: 0.36s; }

  @keyframes slideUp {
    to { opacity: 1; transform: translateY(0); }
  }

  .icon {
    width: 30px;
    height: 30px;
    border-radius: 8px;
    background: rgba(232, 82, 26, 0.15);
    border: 1px solid rgba(232, 82, 26, 0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 16px;
    color: #e8521a;
    font-weight: 700;
    line-height: 1;
  }

  .text-wrap {
    position: relative;
    font-size: 15.5px;
    font-weight: 500;
    color: #5a5a5a;
    line-height: 1.4;
    flex: 1;
  }

  .strike {
    position: absolute;
    left: 0;
    top: 50%;
    width: 100%;
    height: 1.5px;
    background: linear-gradient(90deg, #e8521a, rgba(232,82,26,0.4));
    transform-origin: left center;
    transform: scaleX(0);
    animation: strikeAnim 0.45s cubic-bezier(0.77,0,0.18,1) forwards;
  }
  .card:nth-child(1) .strike { animation-delay: 0.3s; }
  .card:nth-child(2) .strike { animation-delay: 0.48s; }
  .card:nth-child(3) .strike { animation-delay: 0.66s; }

  @keyframes strikeAnim {
    to { transform: scaleX(1); }
  }
</style>
</head>
<body>
  <div class="label">Option 2 — Card Style</div>
  <div class="block">
    <div class="card">
      <div class="icon">×</div>
      <div class="text-wrap">
        Asking the waiter. "Sir, everything is good, sir."
        <span class="strike"></span>
      </div>
    </div>
    <div class="card">
      <div class="icon">×</div>
      <div class="text-wrap">
        4.3 stars. 1,200 reviews. Zero about the food.
        <span class="strike"></span>
      </div>
    </div>
    <div class="card">
      <div class="icon">×</div>
      <div class="text-wrap">
        Ordering paneer tikka. Again. Like always.
        <span class="strike"></span>
      </div>
    </div>
  </div>
</body>
</html>
