<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Option 1 — Current Style (Refined)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0e0e0e;
    font-family: 'Inter', system-ui, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 40px 24px;
  }

  .label {
    position: fixed;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    color: #666;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 6px 14px;
    border-radius: 20px;
  }

  .block {
    display: flex;
    flex-direction: column;
    gap: 14px;
    max-width: 480px;
    width: 100%;
  }

  .row {
    display: flex;
    align-items: center;
    gap: 14px;
    opacity: 0;
    transform: translateX(-12px);
    animation: fadeIn 0.35s ease-out forwards;
  }
  .row:nth-child(1) { animation-delay: 0s; }
  .row:nth-child(2) { animation-delay: 0.22s; }
  .row:nth-child(3) { animation-delay: 0.44s; }

  @keyframes fadeIn {
    to { opacity: 1; transform: translateX(0); }
  }

  .icon {
    width: 26px;
    height: 26px;
    border-radius: 7px;
    background: #e8521a;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 15px;
    color: #fff;
    font-weight: 700;
    line-height: 1;
  }

  .text-wrap {
    position: relative;
    font-size: 17px;
    color: #6b6b6b;
    line-height: 1.4;
  }

  .strike {
    position: absolute;
    left: 0;
    top: 52%;
    width: 100%;
    height: 2px;
    background: #e8521a;
    transform-origin: left center;
    transform: scaleX(0);
    animation: strikeAnim 0.38s ease-in-out forwards;
  }
  .row:nth-child(1) .strike { animation-delay: 0.32s; }
  .row:nth-child(2) .strike { animation-delay: 0.54s; }
  .row:nth-child(3) .strike { animation-delay: 0.76s; }

  @keyframes strikeAnim {
    to { transform: scaleX(1); }
  }
</style>
</head>
<body>
  <div class="label">Option 1 — Current (Refined)</div>
  <div class="block">
    <div class="row">
      <div class="icon">×</div>
      <div class="text-wrap">
        Asking the waiter. "Sir, everything is good, sir."
        <span class="strike"></span>
      </div>
    </div>
    <div class="row">
      <div class="icon">×</div>
      <div class="text-wrap">
        4.3 stars. 1,200 reviews. Zero about the food.
        <span class="strike"></span>
      </div>
    </div>
    <div class="row">
      <div class="icon">×</div>
      <div class="text-wrap">
        Ordering paneer tikka. Again. Like always.
        <span class="strike"></span>
      </div>
    </div>
  </div>
</body>
</html>
