<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cravia — App Flows Simulator</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0f1a;--sidebar:#13131f;--card:#1a1a2e;--card-hover:#222240;
  --border:#2a2a40;--text:#e0e0e8;--text-secondary:#9a9ab0;--text-muted:#6a6a80;
  --red:#E23744;--orange:#FF6B35;--gold:#FFB800;--green:#22c55e;--blue:#3b82f6;
  --purple:#a855f7;--teal:#14b8a6;--amber:#f59e0b;--cyan:#06b6d4;
  --mono:'SF Mono','Fira Code','Cascadia Code',Consolas,monospace;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  --wf-surface:#161628;--wf-block:#1e1e36;--wf-line:#2a2a48;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.5}
::selection{background:var(--red);color:#fff}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#444}

.app{display:flex;flex-direction:column;height:100vh}

/* ── Top Bar ── */
.topbar{display:flex;align-items:center;gap:12px;padding:0 16px;height:48px;background:var(--sidebar);border-bottom:1px solid var(--border);flex-shrink:0;z-index:20}
.topbar-logo{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:700;letter-spacing:-.3px;white-space:nowrap}
.topbar-logo svg{flex-shrink:0}
.topbar-logo .logo-dish{color:var(--red)}
.topbar-logo .logo-check{color:var(--orange)}
.topbar-label{font-size:10px;font-weight:600;color:var(--text-muted);background:var(--card);border:1px solid var(--border);border-radius:4px;padding:2px 7px;white-space:nowrap}
.topbar-search{flex:1;max-width:320px;margin-left:auto;position:relative}
.topbar-search input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:6px 10px 6px 30px;color:var(--text);font-size:12px;outline:none;transition:border .2s}
.topbar-search input:focus{border-color:var(--red)}
.topbar-search svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text-muted);pointer-events:none}
.view-toggle{display:flex;border:1px solid var(--border);border-radius:6px;overflow:hidden;flex-shrink:0}
.view-toggle button{padding:5px 12px;font-size:11px;font-weight:600;border:none;cursor:pointer;background:transparent;color:var(--text-secondary);transition:all .2s}
.view-toggle button.active{background:var(--red);color:#fff}
.view-toggle button:hover:not(.active){background:var(--card)}
.topbar-btn{padding:5px 12px;font-size:11px;font-weight:600;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--text-secondary);cursor:pointer;transition:all .2s;white-space:nowrap;display:flex;align-items:center;gap:5px}
.topbar-btn:hover{border-color:var(--orange);color:var(--orange)}
.topbar-btn.active{background:var(--orange);border-color:var(--orange);color:#fff}
.topbar-btn.tour-btn{border-color:var(--purple);color:var(--purple)}
.topbar-btn.tour-btn:hover,.topbar-btn.tour-btn.active{background:var(--purple);color:#fff}
.hamburger{display:none;background:none;border:none;color:var(--text);cursor:pointer;padding:4px}

/* ── Breadcrumb ── */
.breadcrumb-bar{display:flex;align-items:center;gap:6px;padding:6px 16px;background:rgba(13,15,26,.8);border-bottom:1px solid var(--border);flex-shrink:0;min-height:32px;overflow-x:auto}
.breadcrumb-item{font-size:11px;color:var(--text-muted);cursor:pointer;padding:2px 8px;border-radius:4px;white-space:nowrap;transition:all .15s}
.breadcrumb-item:hover{color:var(--text);background:var(--card)}
.breadcrumb-item.current{color:var(--orange);font-weight:600}
.breadcrumb-sep{color:var(--text-muted);font-size:10px;flex-shrink:0}
.breadcrumb-reset{font-size:10px;color:var(--text-muted);cursor:pointer;margin-left:auto;padding:2px 8px;border:1px solid var(--border);border-radius:4px;white-space:nowrap;transition:all .15s;flex-shrink:0}
.breadcrumb-reset:hover{color:var(--red);border-color:var(--red)}

/* ── Body ── */
.body{display:flex;flex:1;overflow:hidden;position:relative}

/* ── Sidebar ── */
.sidebar{width:220px;flex-shrink:0;background:var(--sidebar);border-right:1px solid var(--border);overflow-y:auto;padding:8px 0;transition:transform .3s}
.sidebar-group{margin-bottom:4px}
.sidebar-group-label{display:flex;align-items:center;gap:6px;padding:4px 14px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--text-muted)}
.sidebar-item{display:flex;align-items:center;gap:7px;padding:6px 14px;cursor:pointer;font-size:12px;color:var(--text-secondary);transition:all .15s;border-left:3px solid transparent}
.sidebar-item:hover{background:rgba(255,255,255,.04);color:var(--text)}
.sidebar-item.active{background:rgba(226,55,68,.1);color:var(--red);border-left-color:var(--red)}
.sidebar-item.hidden{display:none}
.sidebar-icon{width:14px;height:14px;flex-shrink:0;opacity:.6}
.sidebar-item.active .sidebar-icon{opacity:1}
.sidebar-summary{padding:12px 14px;border-top:1px solid var(--border);margin-top:4px}
.sidebar-summary-title{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);margin-bottom:6px}
.sidebar-stat{display:flex;justify-content:space-between;font-size:11px;color:var(--text-secondary);padding:2px 0}
.sidebar-stat span:last-child{color:var(--text);font-weight:600}

/* ── Main Panel ── */
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.main-content{flex:1;overflow-y:auto;padding:20px 24px;padding-bottom:40px}
.main.api-view-active .page-view{display:none}
.main.api-view-active .api-view{display:block}
.main:not(.api-view-active) .page-view{display:block}
.main:not(.api-view-active) .api-view{display:none}

/* ── Wireframe Styles ── */
.wf-container{max-width:900px;margin:0 auto}
.wf-page{background:var(--wf-surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.wf-page-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.wf-page-title{font-size:16px;font-weight:700}
.wf-page-route{font-family:var(--mono);font-size:11px;color:var(--orange);background:rgba(255,107,53,.1);padding:2px 8px;border-radius:4px}
.wf-badge{font-size:9px;font-weight:700;padding:2px 8px;border-radius:10px;letter-spacing:.3px}
.wf-badge-server{background:rgba(34,197,94,.15);color:var(--green)}
.wf-badge-client{background:rgba(59,130,246,.15);color:var(--blue)}
.wf-badge-public{background:rgba(255,184,0,.12);color:var(--gold)}
.wf-badge-protected{background:rgba(168,85,247,.12);color:var(--purple)}
.wf-badge-admin{background:rgba(226,55,68,.12);color:var(--red)}
.wf-body{padding:20px}
.wf-section{margin-bottom:20px}
.wf-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text-muted);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.wf-section-title::before{content:'';width:3px;height:12px;background:var(--red);border-radius:2px}
.wf-row{display:flex;gap:16px;margin-bottom:16px}
.wf-col{flex:1;min-width:0}
.wf-col-side{width:260px;flex-shrink:0}

/* Wireframe Elements */
.wf-img{background:var(--wf-block);border:1px dashed var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:20px;aspect-ratio:16/9;margin-bottom:12px;position:relative;overflow:hidden}
.wf-img.square{aspect-ratio:1}
.wf-img.short{aspect-ratio:3/1}
.wf-img-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px}
.wf-img-grid .wf-img{aspect-ratio:1;margin-bottom:0}
.wf-text{height:10px;background:var(--wf-line);border-radius:3px;margin-bottom:6px}
.wf-text.title{height:16px;width:60%;background:var(--text-muted);margin-bottom:8px}
.wf-text.subtitle{height:12px;width:40%;margin-bottom:8px}
.wf-text.short{width:35%}
.wf-text.medium{width:55%}
.wf-text.long{width:85%}
.wf-text.full{width:100%}

.wf-btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 18px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;border:none;position:relative}
.wf-btn.primary{background:var(--red);color:#fff}
.wf-btn.primary:hover{background:#c92f3c;transform:translateY(-1px)}
.wf-btn.secondary{background:var(--card);color:var(--text);border:1px solid var(--border)}
.wf-btn.secondary:hover{border-color:var(--text-muted)}
.wf-btn.ghost{background:transparent;color:var(--text-secondary);border:1px solid var(--border)}
.wf-btn.ghost:hover{color:var(--text);border-color:var(--text-muted)}
.wf-btn.small{padding:5px 12px;font-size:11px}
.wf-btn.icon-btn{width:36px;height:36px;padding:0;border-radius:50%;font-size:16px}
.wf-btn .api-dot{display:none;width:6px;height:6px;border-radius:50%;background:var(--orange);position:absolute;top:3px;right:3px;box-shadow:0 0 6px var(--orange)}
.show-api-dots .wf-btn.has-api .api-dot{display:block}
.wf-btn.pulse{animation:pulse-orange .6s ease-out}
@keyframes pulse-orange{0%{box-shadow:0 0 0 0 rgba(255,107,53,.6)}100%{box-shadow:0 0 0 20px rgba(255,107,53,0)}}

.wf-input{background:var(--wf-block);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--text-muted);margin-bottom:8px;width:100%;display:block}
.wf-select{background:var(--wf-block);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--text-muted);margin-bottom:8px}

.wf-card{background:var(--wf-block);border:1px solid var(--border);border-radius:10px;padding:12px;cursor:pointer;transition:all .2s;position:relative}
.wf-card:hover{border-color:var(--text-muted);transform:translateY(-1px)}
.wf-card .api-dot{display:none;width:6px;height:6px;border-radius:50%;background:var(--orange);position:absolute;top:6px;right:6px;box-shadow:0 0 6px var(--orange)}
.show-api-dots .wf-card.has-api .api-dot{display:block}
.wf-card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
.wf-card-grid.cols-2{grid-template-columns:repeat(2,1fr)}
.wf-card-grid.cols-3{grid-template-columns:repeat(3,1fr)}
.wf-card-img{background:var(--card);border-radius:6px;aspect-ratio:4/3;margin-bottom:8px;display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:16px}
.wf-stars{display:flex;gap:2px;margin-bottom:4px}
.wf-star{color:var(--gold);font-size:12px}
.wf-star.empty{color:var(--text-muted)}

.wf-chip-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.wf-chip{padding:4px 12px;border-radius:16px;font-size:11px;background:var(--wf-block);border:1px solid var(--border);color:var(--text-secondary);cursor:pointer;transition:all .15s;position:relative}
.wf-chip:hover{border-color:var(--text-muted);color:var(--text)}
.wf-chip.active{background:rgba(226,55,68,.15);border-color:var(--red);color:var(--red)}

.wf-review{background:var(--wf-block);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px;position:relative}
.wf-review-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.wf-avatar{width:28px;height:28px;border-radius:50%;background:var(--card);display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:10px;flex-shrink:0}
.wf-review-actions{display:flex;gap:8px;margin-top:10px}
.wf-review .api-dot{display:none;width:6px;height:6px;border-radius:50%;background:var(--orange);position:absolute;top:6px;right:6px;box-shadow:0 0 6px var(--orange)}
.show-api-dots .wf-review.has-api .api-dot{display:block}

.wf-stat-card{background:var(--wf-block);border:1px solid var(--border);border-radius:10px;padding:16px;text-align:center}
.wf-stat-num{font-size:28px;font-weight:700;color:var(--text);margin-bottom:2px}
.wf-stat-label{font-size:11px;color:var(--text-muted)}

.wf-list-item{display:flex;align-items:center;gap:12px;padding:12px;background:var(--wf-block);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;cursor:pointer;transition:all .15s;position:relative}
.wf-list-item:hover{border-color:var(--text-muted)}
.wf-list-item .api-dot{display:none;width:6px;height:6px;border-radius:50%;background:var(--orange);position:absolute;top:6px;right:6px;box-shadow:0 0 6px var(--orange)}
.show-api-dots .wf-list-item.has-api .api-dot{display:block}

.wf-form{max-width:400px}
.wf-form-label{font-size:11px;font-weight:600;color:var(--text-secondary);margin-bottom:4px}
.wf-form-group{margin-bottom:12px}
.wf-divider{height:1px;background:var(--border);margin:16px 0}
.wf-empty{text-align:center;padding:32px;color:var(--text-muted);font-size:13px}
.wf-hero{background:linear-gradient(135deg,rgba(226,55,68,.08),rgba(255,107,53,.05));border-radius:10px;padding:28px;text-align:center;margin-bottom:20px}
.wf-hero .wf-text.title{margin:0 auto 8px}
.wf-hero .wf-text.subtitle{margin:0 auto 12px}

.wf-step-indicator{display:flex;align-items:center;gap:8px;margin-bottom:16px;justify-content:center}
.wf-step{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;border:2px solid var(--border);color:var(--text-muted)}
.wf-step.active{border-color:var(--red);color:var(--red);background:rgba(226,55,68,.1)}
.wf-step.done{border-color:var(--green);color:var(--green);background:rgba(34,197,94,.1)}
.wf-step-line{width:32px;height:2px;background:var(--border)}

.wf-table{width:100%;border-collapse:collapse;font-size:12px}
.wf-table th{text-align:left;padding:8px;color:var(--text-muted);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
.wf-table td{padding:8px;border-bottom:1px solid var(--border);color:var(--text-secondary)}

.wf-tabs{display:flex;gap:0;margin-bottom:16px;border-bottom:2px solid var(--border)}
.wf-tab{padding:8px 16px;font-size:12px;font-weight:600;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s}
.wf-tab.active{color:var(--red);border-bottom-color:var(--red)}
.wf-tab:hover:not(.active){color:var(--text)}

/* ── Flow Panel ── */
.flow-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:50;opacity:0;transition:opacity .2s}
.flow-overlay.open{display:block;opacity:1}
.flow-panel{position:fixed;top:0;right:0;bottom:0;width:420px;max-width:90vw;background:var(--sidebar);border-left:1px solid var(--border);z-index:51;transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
.flow-panel.open{transform:translateX(0)}
.flow-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.flow-title{font-size:14px;font-weight:700}
.flow-close{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:18px;padding:4px;border-radius:4px;transition:all .15s}
.flow-close:hover{color:var(--text);background:var(--card)}
.flow-body{flex:1;overflow-y:auto;padding:20px}
.flow-trigger{font-size:13px;color:var(--text);margin-bottom:16px;padding:10px 14px;background:var(--card);border-radius:8px;border-left:3px solid var(--orange)}
.flow-step{margin-bottom:16px;opacity:0;transform:translateY(10px);animation:flow-step-in .3s forwards}
.flow-step:nth-child(2){animation-delay:.1s}
.flow-step:nth-child(3){animation-delay:.2s}
.flow-step:nth-child(4){animation-delay:.3s}
.flow-step:nth-child(5){animation-delay:.4s}
.flow-step:nth-child(6){animation-delay:.5s}
@keyframes flow-step-in{to{opacity:1;transform:translateY(0)}}
.flow-step-num{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;font-size:10px;font-weight:700;margin-right:8px;flex-shrink:0}
.flow-step-num.fn{background:rgba(6,182,212,.15);color:var(--cyan)}
.flow-step-num.api{background:rgba(255,107,53,.15);color:var(--orange)}
.flow-step-num.db{background:rgba(20,184,166,.15);color:var(--teal)}
.flow-step-num.out{background:rgba(168,85,247,.15);color:var(--purple)}
.flow-step-title{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;display:flex;align-items:center}
.flow-step-content{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:12px}
.flow-step-content code{font-family:var(--mono);font-size:11px;color:var(--orange)}
.flow-step-content .filepath{font-family:var(--mono);font-size:10px;color:var(--text-muted);display:block;margin-top:3px}
.flow-step-content .method-badge{font-size:9px;padding:2px 6px;margin-right:6px}
.flow-nav-btn{display:flex;align-items:center;gap:8px;width:100%;padding:12px 16px;background:rgba(168,85,247,.1);border:1px solid rgba(168,85,247,.3);border-radius:8px;color:var(--purple);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;margin-top:8px}
.flow-nav-btn:hover{background:rgba(168,85,247,.2);border-color:var(--purple)}

/* ── Devtools Panel ── */
.devtools{position:fixed;bottom:0;left:220px;right:0;background:var(--sidebar);border-top:1px solid var(--border);z-index:15;transition:all .3s}
.devtools.minimized{height:28px}
.devtools.minimized .devtools-body{display:none}
.devtools-header{display:flex;align-items:center;padding:4px 12px;height:28px;cursor:pointer;gap:8px;user-select:none}
.devtools-header:hover{background:rgba(255,255,255,.02)}
.devtools-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text-muted)}
.devtools-count{font-size:10px;color:var(--orange);font-weight:600}
.devtools-toggle{margin-left:auto;font-size:10px;color:var(--text-muted)}
.devtools-clear{font-size:10px;color:var(--text-muted);cursor:pointer;padding:2px 6px;border-radius:3px;transition:all .15s;background:none;border:none}
.devtools-clear:hover{color:var(--red);background:var(--card)}
.devtools-body{max-height:180px;overflow-y:auto;padding:4px 0}
.devtools-entry{display:flex;align-items:flex-start;gap:8px;padding:3px 12px;font-family:var(--mono);font-size:11px;border-bottom:1px solid rgba(42,42,64,.5)}
.devtools-entry:hover{background:rgba(255,255,255,.02)}
.devtools-time{color:var(--text-muted);white-space:nowrap;flex-shrink:0;width:55px}
.devtools-arrow{flex-shrink:0}
.devtools-arrow.req{color:var(--orange)}
.devtools-arrow.res{color:var(--green)}
.devtools-method{font-weight:700;flex-shrink:0}
.devtools-method.GET{color:var(--green)}
.devtools-method.POST{color:var(--blue)}
.devtools-method.PATCH{color:var(--amber)}
.devtools-method.DELETE{color:var(--red)}
.devtools-route{color:var(--text-secondary)}
.devtools-status{color:var(--green);margin-left:auto;flex-shrink:0}
.devtools-response{color:var(--text-muted);margin-left:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:300px}
@keyframes devtools-fade-in{from{opacity:0;background:rgba(255,107,53,.1)}to{opacity:1;background:transparent}}
.devtools-entry.new{animation:devtools-fade-in .5s ease-out}

/* ── API View (kept from original) ── */
.api-view{display:none}
.api-filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.api-filter-btn{padding:5px 14px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid var(--border);background:transparent;color:var(--text-secondary);cursor:pointer;transition:all .15s}
.api-filter-btn:hover{border-color:var(--text-muted)}
.api-filter-btn.active{background:var(--red);border-color:var(--red);color:#fff}
.api-table{width:100%;border-collapse:separate;border-spacing:0}
.api-table th{position:sticky;top:0;background:var(--sidebar);padding:10px 14px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text-muted);text-align:left;border-bottom:1px solid var(--border);z-index:2}
.api-table td{padding:10px 14px;font-size:13px;border-bottom:1px solid var(--border);vertical-align:top;transition:background .15s}
.api-table tr:hover td{background:rgba(255,255,255,.02)}
.api-table tr.expanded td{background:rgba(226,55,68,.03)}
.api-table tr{cursor:pointer}
.api-route-cell{font-family:var(--mono);font-size:12px}
.method-badge{display:inline-flex;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;font-family:var(--mono);letter-spacing:.5px;min-width:50px;justify-content:center}
.method-GET{background:rgba(34,197,94,.15);color:var(--green)}
.method-POST{background:rgba(59,130,246,.15);color:var(--blue)}
.method-PATCH{background:rgba(245,158,11,.15);color:var(--amber)}
.method-DELETE{background:rgba(226,55,68,.15);color:var(--red)}
.api-auth-badge{font-size:11px;padding:2px 8px;border-radius:10px}
.api-auth-required{background:rgba(168,85,247,.1);color:var(--purple)}
.api-auth-admin{background:rgba(226,55,68,.1);color:var(--red)}
.api-auth-none{background:rgba(255,255,255,.05);color:var(--text-muted)}
.api-auth-optional{background:rgba(255,184,0,.1);color:var(--gold)}
.api-collections{display:flex;flex-wrap:wrap;gap:4px}
.api-collection-pill{font-family:var(--mono);font-size:10px;padding:1px 6px;border-radius:4px;background:rgba(20,184,166,.08);color:var(--teal)}
.api-rate-badge{font-size:10px;padding:2px 6px;border-radius:4px}
.api-rate-yes{background:rgba(245,158,11,.1);color:var(--amber)}
.api-rate-no{color:var(--text-muted)}
.api-expand{background:var(--card);border-bottom:1px solid var(--border)}
.api-expand td{padding:0 !important}
.api-expand-inner{padding:16px 24px;display:grid;gap:12px}
.api-expand-row{display:flex;gap:12px;font-size:12px}
.api-expand-label{font-weight:700;color:var(--text-muted);min-width:100px;flex-shrink:0}
.api-expand-value{color:var(--text-secondary)}
.api-expand-value code{font-family:var(--mono);font-size:11px;color:var(--orange)}
.api-expand-pages{display:flex;flex-wrap:wrap;gap:4px}
.api-expand-page{font-size:11px;padding:2px 10px;border-radius:12px;background:rgba(168,85,247,.08);color:var(--purple);cursor:pointer;transition:all .15s;border:1px solid transparent}
.api-expand-page:hover{border-color:var(--purple)}
.api-expand-side-effect{display:flex;align-items:flex-start;gap:6px;font-size:12px;color:var(--text-secondary)}
.api-expand-side-effect::before{content:'→';color:var(--orange);flex-shrink:0}
.hidden-row{display:none}
.highlight{background:rgba(226,55,68,.2);border-radius:2px;padding:0 2px}

/* ── Responsive ── */
@media(max-width:900px){
  .sidebar{position:fixed;top:0;left:0;bottom:0;z-index:30;transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:25}
  .sidebar-overlay.open{display:block}
  .hamburger{display:block}
  .main-content{padding:12px}
  .devtools{left:0}
  .flow-panel{width:100vw}
  .wf-row{flex-direction:column}
  .wf-col-side{width:100%}
  .wf-card-grid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:600px){
  .topbar-label{display:none}
  .topbar-search{max-width:none;order:10;flex-basis:100%}
  .topbar{flex-wrap:wrap;height:auto;padding:8px 12px}
  .wf-card-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <button class="hamburger" onclick="toggleSidebar()" aria-label="Menu">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h14M3 10h14M3 14h14"/></svg>
    </button>
    <div class="topbar-logo">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" fill="#E23744" opacity=".15"/><path d="M8 12.5C8 10 9.5 8 12 8s4 2 4 4.5c0 1.5-1 3-2 3.5h-4c-1-.5-2-2-2-3.5z" fill="#E23744"/><path d="M10 8V6M14 8V6M12 8V5" stroke="#FF6B35" stroke-width="1.5" stroke-linecap="round"/></svg>
      <span><span class="logo-dish">Dish</span><span class="logo-check">Check</span></span>
    </div>
    <span class="topbar-label">Simulator</span>
    <div class="topbar-search">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2"><circle cx="5.5" cy="5.5" r="4.5"/><path d="M9 9l3 3"/></svg>
      <input type="text" id="searchInput" placeholder="Search pages, actions…" autocomplete="off" spellcheck="false">
    </div>
    <div class="view-toggle">
      <button class="active" data-view="page" onclick="switchView('page')">Simulate</button>
      <button data-view="api" onclick="switchView('api')">API View</button>
    </div>
    <button class="topbar-btn" id="apiDotsBtn" onclick="toggleApiDots()">
      <svg width="10" height="10" viewBox="0 0 10 10"><circle cx="5" cy="5" r="4" fill="currentColor"/></svg>
      API Dots
    </button>
    <button class="topbar-btn tour-btn" id="tourBtn" onclick="startTour()">▶ Auto Tour</button>
  </header>

  <div class="breadcrumb-bar" id="breadcrumbBar">
    <span class="breadcrumb-item current" data-index="0">Landing Page</span>
    <span class="breadcrumb-reset" onclick="resetJourney()">✕ Reset</span>
  </div>

  <div class="body">
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
    <nav class="sidebar" id="sidebar">
      <div id="sidebarContent"></div>
      <div class="sidebar-summary">
        <div class="sidebar-summary-title">Summary</div>
        <div class="sidebar-stat"><span>Pages</span><span>29</span></div>
        <div class="sidebar-stat"><span>API Routes</span><span>39</span></div>
        <div class="sidebar-stat"><span>Layouts</span><span>5</span></div>
      </div>
    </nav>
    <main class="main" id="mainPanel">
      <div class="main-content" id="mainContent">
        <div class="page-view" id="pageView"></div>
        <div class="api-view" id="apiView"></div>
      </div>
    </main>
  </div>
</div>

<!-- Flow Panel -->
<div class="flow-overlay" id="flowOverlay" onclick="closeFlowPanel()"></div>
<div class="flow-panel" id="flowPanel">
  <div class="flow-header">
    <span class="flow-title">Action Flow</span>
    <button class="flow-close" onclick="closeFlowPanel()">✕</button>
  </div>
  <div class="flow-body" id="flowBody"></div>
</div>

<!-- Devtools Panel -->
<div class="devtools minimized" id="devtools">
  <div class="devtools-header" onclick="toggleDevtools()">
    <span class="devtools-label">Network</span>
    <span class="devtools-count" id="devtoolsCount">0 requests</span>
    <button class="devtools-clear" onclick="event.stopPropagation();clearDevtools()">Clear</button>
    <span class="devtools-toggle" id="devtoolsToggle">▲</span>
  </div>
  <div class="devtools-body" id="devtoolsBody"></div>
</div>

function e(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):''}
function cap(s){return s?s[0].toUpperCase()+s.slice(1):''}
function hasApi(a){return a.apiCall&&(a.apiCall.startsWith('GET ')||a.apiCall.startsWith('POST ')||a.apiCall.startsWith('PATCH ')||a.apiCall.startsWith('DELETE '))}
function parseApiCall(s){const m=s&&s.match(/^(GET|POST|PATCH|DELETE)\s+(\/api\/[^\s]+)/);return m?{method:m[1],route:m[2]}:null}
function normalizeR(r){return r.replace(/\[[^\]]+\]/g,'*').replace(/\{[^}]+\}/g,'*').replace(/\?.*$/,'')}
function findPageByRoute(r){const c=r.replace(/\?.*$/,'').replace(/\{[^}]+\}/g,'[id]');return D.pages.findIndex(p=>{const pr=p.route.replace(/\[.*?\]/g,'[id]');return pr===c||c.startsWith(pr)})}
function findApiRoute(method,route){return D.apiRoutes.find(a=>a.method===method&&normalizeR(a.route)===normalizeR(route))}
function starsHtml(n){let h='';for(let i=0;i<5;i++)h+=`<span class="wf-star${i<n?'':' empty'}">★</span>`;return h}
function apiDot(){return '<span class="api-dot"></span>'}

// ═══════════════════════════════════════════════
// SIDEBAR
// ═══════════════════════════════════════════════
function buildSidebar(){
  let h='';
  cats.forEach(cat=>{
    h+=`<div class="sidebar-group"><div class="sidebar-group-label"><span class="sidebar-icon">${cat.icon}</span>${cat.label}</div>`;
    cat.pages.forEach(p=>{
      h+=`<div class="sidebar-item" data-index="${p._i}" onclick="navToPage(${p._i})"><span class="sidebar-icon">${cat.icon}</span><span>${e(p.name)}</span></div>`;
    });
    h+='</div>';
  });
  document.getElementById('sidebarContent').innerHTML=h;
}
function updateSidebarActive(){
  document.querySelectorAll('.sidebar-item').forEach(el=>{
    el.classList.toggle('active',parseInt(el.dataset.index)===currentPageIndex);
  });
}

// ═══════════════════════════════════════════════
// BREADCRUMB
// ═══════════════════════════════════════════════
function buildBreadcrumb(){
  const bar=document.getElementById('breadcrumbBar');
  let h='';
  journey.forEach((j,i)=>{
    if(i>0) h+='<span class="breadcrumb-sep">›</span>';
    h+=`<span class="breadcrumb-item${i===journey.length-1?' current':''}" onclick="jumpBreadcrumb(${i})">${e(j.name)}</span>`;
  });
  h+='<span class="breadcrumb-reset" onclick="resetJourney()">✕ Reset</span>';
  bar.innerHTML=h;
}
function jumpBreadcrumb(i){
  journey=journey.slice(0,i+1);
  selectPage(journey[i].index,false);
}
function resetJourney(){
  journey=[{index:0,name:'Landing Page'}];
  selectPage(0,false);
}

function genericWireframe(page){
  let h='<div class="wf-section-title">Page Content</div>';
  if(page.onMount.length){
    h+='<div style="margin-bottom:12px;font-size:11px;color:var(--text-muted)">Loads '+page.onMount.length+' data source'+(page.onMount.length>1?'s':'')+'</div>';
  }
  if(page.userActions.length){
    h+='<div style="display:flex;flex-wrap:wrap;gap:8px">';

      h+=act(page,i,'wf-btn secondary small'+(hasApi(a)?' has-api':''),e(a.trigger));

  }
  if(!page.userActions.length) h+='<div class="wf-empty">No interactive elements</div>';
  return h;
}

// FLOW PANEL
// ═══════════════════════════════════════════════
function triggerAction(pageIdx,actionIdx,el){
  const page=D.pages[pageIdx];
  const action=page.userActions[actionIdx];
  if(!action)return;

  // Pulse animation
  el.classList.remove('pulse');
  void el.offsetWidth;
  el.classList.add('pulse');

  // Build flow
  const fb=document.getElementById('flowBody');
  let h=`<div class="flow-trigger">🖱️ <b>${e(action.trigger)}</b></div>`;

  // Step 1: Function
  h+=`<div class="flow-step"><div class="flow-step-title"><span class="flow-step-num fn">1</span>Function Called</div>
  <div class="flow-step-content"><code>${e(action.function)}</code>
  ${page.file?`<span class="filepath">${e(page.file)}</span>`:''}</div></div>`;

  // Step 2: API
  const parsed=parseApiCall(action.apiCall);
  if(parsed){
    const apiDef=findApiRoute(parsed.method,parsed.route);
    h+=`<div class="flow-step"><div class="flow-step-title"><span class="flow-step-num api">2</span>API Call</div>
    <div class="flow-step-content"><span class="method-badge method-${parsed.method}">${parsed.method}</span> <code>${e(parsed.route)}</code>
    ${apiDef?`<div style="margin-top:6px;font-size:11px;color:var(--text-muted)">${e(apiDef.description)}</div>`:''}
    ${apiDef&&apiDef.validation?`<div style="margin-top:4px;font-size:10px;color:var(--text-muted)">Validation: ${e(apiDef.validation)}</div>`:''}</div></div>`;

    // Log to devtools
    logApiCall(parsed.method,parsed.route,apiDef);

    // Step 3: Firestore
    if(apiDef&&apiDef.firestoreCollections&&apiDef.firestoreCollections.length){
      h+=`<div class="flow-step"><div class="flow-step-title"><span class="flow-step-num db">3</span>Firestore Collections</div>
      <div class="flow-step-content"><div class="api-collections">${apiDef.firestoreCollections.map(c=>'<span class="api-collection-pill">'+e(c)+'</span>').join('')}</div></div></div>`;
    }
    // Side effects
    if(apiDef&&apiDef.sideEffects&&apiDef.sideEffects.length){
      h+=`<div class="flow-step"><div class="flow-step-title"><span class="flow-step-num db">⚡</span>Side Effects</div>
      <div class="flow-step-content">${apiDef.sideEffects.map(s=>'<div class="api-expand-side-effect">'+e(s)+'</div>').join('')}</div></div>`;
    }
  } else if(action.apiCall){
    h+=`<div class="flow-step"><div class="flow-step-title"><span class="flow-step-num api">2</span>External Call</div>
    <div class="flow-step-content"><code>${e(action.apiCall)}</code></div></div>`;
  } else {
    h+=`<div class="flow-step"><div class="flow-step-title"><span class="flow-step-num api" style="opacity:.4">2</span>API Call</div>
    <div class="flow-step-content" style="color:var(--text-muted);font-style:italic">No API call — client-only action</div></div>`;
  }

  // Step: Outcome
  h+=`<div class="flow-step"><div class="flow-step-title"><span class="flow-step-num out">${parsed?'4':'3'}</span>Outcome</div>
  <div class="flow-step-content">${e(action.outcome)}</div></div>`;

  // Navigation button
  if(action.navigatesTo&&!action.navigatesTo.startsWith('External')){
    const target=action.navigatesTo.replace(/\?.*$/,'').replace(/\{[^}]+\}/g,'[id]');
    const tIdx=findPageByRoute(target);
    if(tIdx>=0){
      h+=`<button class="flow-nav-btn" onclick="closeFlowPanel();navToPage(${tIdx})">Go to ${e(D.pages[tIdx].name)} →</button>`;
    }
  }

  fb.innerHTML=h;
  openFlowPanel();
}

function openFlowPanel(){
  document.getElementById('flowOverlay').classList.add('open');
  document.getElementById('flowPanel').classList.add('open');
}
function closeFlowPanel(){
  document.getElementById('flowOverlay').classList.remove('open');
  document.getElementById('flowPanel').classList.remove('open');
}

// ═══════════════════════════════════════════════
// DEVTOOLS PANEL
// ═══════════════════════════════════════════════
function logApiCall(method,route,apiDef){
  reqCounter++;
  const delay=80+Math.floor(Math.random()*200);
  const returns=apiDef?apiDef.returns:'{ success: true }';
  // Request entry
  devtoolsEntries.push({type:'req',method,route,time:new Date(),id:reqCounter});
  renderDevtools();

  // Response after simulated delay
  setTimeout(()=>{
    devtoolsEntries.push({type:'res',method,route,status:200,delay,returns,time:new Date(),id:reqCounter});
    renderDevtools();
  },delay);
}

function renderDevtools(){
  const body=document.getElementById('devtoolsBody');
  const count=document.getElementById('devtoolsCount');
  const reqs=devtoolsEntries.filter(e=>e.type==='req').length;
  count.textContent=reqs+' request'+(reqs!==1?'s':'');
  let h='';
  devtoolsEntries.forEach((entry,i)=>{
    const t=entry.time;
    const ts=String(t.getHours()).padStart(2,'0')+':'+String(t.getMinutes()).padStart(2,'0')+':'+String(t.getSeconds()).padStart(2,'0');
    const isNew=i>=devtoolsEntries.length-2;
    if(entry.type==='req'){
      h+=`<div class="devtools-entry${isNew?' new':''}"><span class="devtools-time">${ts}</span><span class="devtools-arrow req">→</span><span class="devtools-method ${entry.method}">${entry.method}</span><span class="devtools-route">${e(entry.route)}</span></div>`;
    } else {
      h+=`<div class="devtools-entry${isNew?' new':''}"><span class="devtools-time">${ts}</span><span class="devtools-arrow res">←</span><span class="devtools-status">${entry.status} OK</span><span style="color:var(--text-muted);margin-left:4px">${entry.delay}ms</span><span class="devtools-response">${e(entry.returns)}</span></div>`;
    }
  });
  body.innerHTML=h;
  body.scrollTop=body.scrollHeight;

  if(devtoolsMinimized&&devtoolsEntries.length>0){
    devtoolsMinimized=false;
    document.getElementById('devtools').classList.remove('minimized');
    document.getElementById('devtoolsToggle').textContent='▼';
  }
}

function toggleDevtools(){
  devtoolsMinimized=!devtoolsMinimized;
  document.getElementById('devtools').classList.toggle('minimized',devtoolsMinimized);
  document.getElementById('devtoolsToggle').textContent=devtoolsMinimized?'▲':'▼';
}
function clearDevtools(){
  devtoolsEntries=[];reqCounter=0;
  renderDevtools();
  devtoolsMinimized=true;
  document.getElementById('devtools').classList.add('minimized');
  document.getElementById('devtoolsToggle').textContent='▲';
}

// ═══════════════════════════════════════════════
function buildApiView(){
  const av=document.getElementById('apiView');
  let h='<div class="api-filters">';
  ['ALL','GET','POST','PATCH','DELETE'].forEach(m=>{
    h+=`<button class="api-filter-btn ${apiMethodFilter===m?'active':''}" onclick="filterApiMethod('${m}')">${m}</button>`;
  });
  h+='</div><div style="overflow-x:auto;border-radius:10px;border:1px solid var(--border)"><table class="api-table"><thead><tr><th>Method</th><th>Route</th><th>Description</th><th>Auth</th><th>Collections</th><th>Rate Limit</th></tr></thead><tbody>';
  D.apiRoutes.forEach((api,i)=>{
    const matchM=apiMethodFilter==='ALL'||api.method===apiMethodFilter;
    const matchS=!searchTerm||apiMatchesSearch(api);
    const hidden=(!matchM||!matchS)?' hidden-row':'';
    const exp=expandedApiRow===i;
    h+=`<tr class="${exp?'expanded':''}${hidden}" onclick="toggleApiExpand(${i})" data-api-index="${i}"><td><span class="method-badge method-${api.method}">${api.method}</span></td><td class="api-route-cell">${e(api.route)}</td><td>${e(api.description)}</td><td>${authBadge(api.auth)}</td><td><div class="api-collections">${api.firestoreCollections.map(c=>'<span class="api-collection-pill">'+e(c)+'</span>').join('')||'<span style="color:var(--text-muted);font-size:11px">—</span>'}</div></td><td>${api.rateLimit?'<span class="api-rate-badge api-rate-yes">'+e(api.rateLimit)+'</span>':'<span class="api-rate-badge api-rate-no">—</span>'}</td></tr>`;
    h+=`<tr class="api-expand${hidden}${exp?'':' hidden-row'}"><td colspan="6"><div class="api-expand-inner"><div class="api-expand-row"><span class="api-expand-label">Returns</span><span class="api-expand-value"><code>${e(api.returns)}</code></span></div><div class="api-expand-row"><span class="api-expand-label">Validation</span><span class="api-expand-value">${e(api.validation)}</span></div>${api.sideEffects?'<div class="api-expand-row"><span class="api-expand-label">Side Effects</span><span class="api-expand-value">'+api.sideEffects.map(s=>'<div class="api-expand-side-effect">'+e(s)+'</div>').join('')+'</span></div>':''}${findApiCallers(api).length?'<div class="api-expand-row"><span class="api-expand-label">Called By</span><span class="api-expand-value"><div class="api-expand-pages">'+findApiCallers(api).map(c=>'<span class="api-expand-page" onclick="event.stopPropagation();navToPage('+c._i+')">'+e(c.name)+'</span>').join('')+'</div></span></div>':''}</div></td></tr>`;
  });
  h+='</tbody></table></div>';
  av.innerHTML=h;
}

function authBadge(auth){
  if(!auth||auth==='None') return '<span class="api-auth-badge api-auth-none">None</span>';
  if(auth.toLowerCase().includes('admin')) return '<span class="api-auth-badge api-auth-admin">Admin</span>';
  if(auth.toLowerCase().includes('optional')) return '<span class="api-auth-badge api-auth-optional">Optional</span>';
  if(auth.toLowerCase().includes('webhook')) return '<span class="api-auth-badge api-auth-none">Webhook</span>';
  return '<span class="api-auth-badge api-auth-required">Required</span>';
}
function apiMatchesSearch(api){const t=searchTerm.toLowerCase();return api.route.toLowerCase().includes(t)||api.description.toLowerCase().includes(t)}
function findApiCallers(api){const r=[];D.pages.forEach((p,i)=>{if(p.userActions.some(a=>a.apiCall&&normalizeR(a.apiCall).includes(normalizeR(api.route))))r.push({...p,_i:i});});return r}
function filterApiMethod(m){apiMethodFilter=m;buildApiView()}
function toggleApiExpand(i){expandedApiRow=expandedApiRow===i?-1:i;buildApiView()}

function handleSearch(){
  searchTerm=document.getElementById('searchInput').value.trim();
  const t=searchTerm.toLowerCase();
  document.querySelectorAll('.sidebar-item').forEach(el=>{
    const idx=parseInt(el.dataset.index);
    const p=D.pages[idx];
    let match=!t||p.name.toLowerCase().includes(t)||p.route.toLowerCase().includes(t);
    if(!match) match=p.userActions.some(a=>(a.trigger+a.function+(a.apiCall||'')).toLowerCase().includes(t));
    el.classList.toggle('hidden',!match);
  });
  if(currentView==='api') buildApiView();
}

  tourRunning=true;
  document.getElementById('tourBtn').classList.add('active');
  document.getElementById('tourBtn').innerHTML='■ Stop Tour';

  const steps=[
    {page:0,action:null,delay:1500},
    {page:0,action:1,delay:2000},
    {page:1,action:null,delay:1500},
    {page:1,action:0,delay:2000},
    {page:9,action:null,delay:1500},
    {page:9,action:3,delay:2000},
    {page:11,action:null,delay:1500},
    {page:11,action:0,delay:2000},
    {page:1,action:null,delay:1000}
  ];

  let i=0;
  function runStep(){
    if(!tourRunning||i>=steps.length){stopTour();return}
    const step=steps[i];
    if(step.page!==currentPageIndex) navToPage(step.page);
    if(step.action!==null){
      setTimeout(()=>{
        if(!tourRunning)return;
        const btns=document.querySelectorAll(`[data-action="${step.action}"]`);
        if(btns.length){
          const btn=btns[0];
          btn.scrollIntoView({behavior:'smooth',block:'center'});
          setTimeout(()=>{
            if(!tourRunning)return;
            triggerAction(step.page,step.action,btn);
          },400);
        }
      },600);
    }
    i++;
    tourTimer=setTimeout(runStep,step.delay);
  }
  runStep();
}
function stopTour(){
  tourRunning=false;
  clearTimeout(tourTimer);
  document.getElementById('tourBtn').classList.remove('active');
  document.getElementById('tourBtn').innerHTML='▶ Auto Tour';
}

function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('open');
}

// ═══════════════════════════════════════════════
// KEYBOARD
// ═══════════════════════════════════════════════
document.addEventListener('keydown',ev=>{
  if(ev.key==='Escape'){
    closeFlowPanel();
    if(document.getElementById('searchInput')===document.activeElement){
      document.getElementById('searchInput').value='';
      handleSearch();
    }
    stopTour();
  }
});

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
buildSidebar();
selectPage(0,false);
buildBreadcrumb();
renderDevtools();
document.getElementById('searchInput').addEventListener('input',handleSearch);
</script>
</body>
</html>
